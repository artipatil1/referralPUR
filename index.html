<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Purnartha</title>
    <style>
        /* Force total blackness on the whole screen and browser UI */
        html, body { 
            background-color: #000000 !important; 
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .loader { opacity: 0.6; font-size: 14px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="loader">Connecting...</div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua);

            async function copyAndRedirect(storeUrl) {
                // Only copy if a code exists
                if (code) {
                    try {
                        // Attempt to copy to clipboard
                        const textToCopy = "RmRefCode=" + code;
                        await navigator.clipboard.writeText(textToCopy);
                    } catch (err) {
                        // Fallback for older browsers
                        const textArea = document.createElement("textarea");
                        textArea.value = "RmRefCode=" + code;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                    }
                }
                window.location.replace(storeUrl);
            }

            if (isIOS) {
                // 1. Try to open the app directly
                window.location.href = "purnartha://";
                
                // 2. Fallback logic if app is missing
                let checkTimer = setTimeout(() => {
                    if (!document.hidden) {
                        copyAndRedirect("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 2000);

                // If user leaves the browser (app opens), stop the redirect
                window.onpagehide = () => clearTimeout(checkTimer);
                window.onblur = () => clearTimeout(checkTimer);

            } else if (/android/i.test(ua)) {
                // If it's a "Store" fallback (triggered by intent failure)
                if (params.get('mode') === 'store') {
                    copyAndRedirect("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + code);
                } else {
                    // Try to open app using Intent
                    const packageName = "com.purnarthav2.app";
                    // If this fails, it reloads the same page with mode=store
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=${packageName};S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            }
        };
    </script>
</body>
</html>
