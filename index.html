<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Purnartha</title>
    <style>
        /* All-black UI to prevent any blue/white flickering */
        :root { color-scheme: dark; }
        html, body { 
            background-color: #000000 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }
        .status { color: #444; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>
    <div class="status">Loading Store...</div>
    <input type="text" id="copyInput" style="position:absolute;left:-9999px;">

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isAndroid = ua.indexOf("android") > -1;

            function performCopy() {
                if (!code) return;
                const input = document.getElementById("copyInput");
                input.value = "RmRefCode=" + code;
                input.select();
                try { 
                    // Most reliable way to copy during a fast redirect
                    document.execCommand('copy'); 
                } catch (e) {}
            }

            if (isAndroid) {
                if (params.get('mode') === 'store') {
                    performCopy();
                    // market:// tells Android: "Close Chrome and open the Play Store App"
                    // This bypasses the web preview in your screenshot
                    window.location.replace("market://details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    
                    // Safety fallback if market:// is blocked
                    setTimeout(() => {
                        window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    }, 800);
                } else {
                    // 1. Try to open the app directly first
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            } 
            else if (/iphone|ipad|ipod/.test(ua)) {
                window.location.href = "purnartha://";
                setTimeout(() => {
                    if (!document.hidden) {
                        performCopy();
                        window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 2000);
            }
        };
    </script>
</body>
</html>
