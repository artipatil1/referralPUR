<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Purnartha | Redirecting...</title>
    <style>
        :root { color-scheme: light; }
        html, body {
            background-color: #ffffff !important;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 35px; height: 35px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-size: 16px; font-weight: 500; color: #333; }
        #copyBuffer { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Opening Purnartha...</div>
    <textarea id="copyBuffer"></textarea>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isAndroid = ua.indexOf("android") > -1;

            // 1. Function to copy code to clipboard
            async function copyToClipboard(refCode) {
                if (!refCode) return;
                const textToCopy = "RmRefCode=" + refCode;
                try {
                    await navigator.clipboard.writeText(textToCopy);
                } catch (e) {
                    const buffer = document.getElementById("copyBuffer");
                    buffer.value = textToCopy;
                    buffer.select();
                    document.execCommand('copy');
                }
                console.log("Code copied to clipboard");
            }

            // 2. Immediate Action: Try to open the app and copy code
            copyToClipboard(code);

            if (isIOS) {
                // Try to open App via Custom Scheme
                window.location.href = "purnartha://";
                
                // If the app isn't open within 500ms, redirect to App Store
                setTimeout(() => {
                    if (!document.hidden) {
                        window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 500);

            } else if (isAndroid) {
                // Using Intent for Android: This handles "Open App if exists, else Store" natively
                // S.browser_fallback_url triggers if the app is NOT installed
                const storeUrl = "https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code);
                const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
                
                // Try to launch intent
                window.location.replace(intent);

                // Fallback for older browsers or specific shell apps
                setTimeout(() => {
                    if (!document.hidden) {
                        window.location.replace(storeUrl);
                    }
                }, 800);
            }
        };
    </script>
</body>
</html>
