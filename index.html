<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="msapplication-navbutton-color" content="#ffffff">

    <title>Purnartha | Redirecting...</title>
    <style>
        /* Force the background to be white and remove any scrolling that shows other colors */
        :root { color-scheme: light; }
        html, body {
            background-color: #ffffff !important;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 35px; height: 35px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-size: 16px; font-weight: 500; color: #333; }
        #copyBuffer { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Connecting to App Store...</div>
    <textarea id="copyBuffer"></textarea>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);

            async function performCopyAndStore() {
                if (code) {
                    const buffer = document.getElementById("copyBuffer");
                    buffer.value = "RmRefCode=" + code;
                    buffer.select();
                    try {
                        await navigator.clipboard.writeText("RmRefCode=" + code);
                    } catch (e) {
                        document.execCommand('copy');
                    }
                }
                
                if (isIOS) {
                    window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                } else {
                    // This market:// link is what forces the Play Store APP to open, closing the browser
                    window.location.replace("market://details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    setTimeout(() => {
                        window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    }, 1200);
                }
            }

            if (isIOS) {
                window.location.href = "purnartha://";
                let iosTimer = setTimeout(() => {
                    if (!document.hidden) { performCopyAndStore(); }
                }, 2500);
                window.onblur = () => clearTimeout(iosTimer);
            } else if (ua.indexOf("android") > -1) {
                if (params.get('mode') === 'store') {
                    performCopyAndStore();
                } else {
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            }
        };
    </script>
</body>
</html>
