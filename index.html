<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Purnartha</title>
    <style>
        html, body { background: #000; color: #000; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
</head>
<body>
    <input type="text" id="copyText" style="position:absolute; left:-9999px;" value="">

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isAndroid = ua.indexOf("android") > -1;
            const isIOS = /iphone|ipad|ipod/.test(ua);

            function copyReferral() {
                if (!code) return;
                const input = document.getElementById("copyText");
                input.value = "RmRefCode=" + code;
                input.select();
                try { document.execCommand('copy'); } catch (e) {}
            }

            if (isAndroid) {
                // If we are already in fallback mode, copy and go to store
                if (params.get('mode') === 'store') {
                    copyReferral();
                    window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + code);
                } else {
                    // Try to open app. If it exists, Android kills this browser window immediately.
                    // If it kills the window, the 'copyReferral' never runs (Which is what you want).
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            } 
            else if (isIOS) {
                window.location.href = "purnartha://";
                setTimeout(() => {
                    if (!document.hidden) {
                        copyReferral();
                        window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 2000);
            }
        };
    </script>
</body>
</html>
