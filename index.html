<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Purnartha</title>
    <style>
        /* Force total blackness on the entire viewport */
        :root { color-scheme: dark; }
        html, body { 
            background-color: #000000 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }
        .loading {
            color: rgba(255, 255, 255, 0.3);
            font-family: -apple-system, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loading">Connecting...</div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua);

            async function copyAndGoToStore() {
                if (code) {
                    try {
                        // Attempt modern copy
                        await navigator.clipboard.writeText("RmRefCode=" + code);
                    } catch (e) {
                        // Fallback copy for older Android browsers
                        const textArea = document.createElement("textarea");
                        textArea.value = "RmRefCode=" + code;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                    }
                }
                // Redirect to respective stores
                window.location.replace(isIOS 
                    ? "https://apps.apple.com/in/app/purnartha/id6759093164" 
                    : "https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + code
                );
            }

            if (isIOS) {
                // 1. Try to jump to App
                window.location.href = "purnartha://";
                
                // 2. iOS "Stuck" protection
                let iosCheck = setTimeout(() => {
                    if (!document.hidden) { copyAndGoToStore(); }
                }, 2500);

                // Stop the timer if the app opens
                window.onpagehide = () => clearTimeout(iosCheck);
            } 
            else if (/android/i.test(ua)) {
                if (params.get('mode') === 'store') {
                    copyAndGoToStore();
                } else {
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            }
        };
    </script>
</body>
</html>
