<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting</title>
</head>
<body style="background-color: #000;">
    <script>
        (async function() {
            const code = new URLSearchParams(window.location.search).get('RmRefCode') || "";
            const ua = navigator.userAgent;

            // 1. Copy instantly
            if (code) {
                try {
                    // This happens in the background
                    await navigator.clipboard.writeText("RmRefCode=" + code);
                } catch (e) {}
            }

            // 2. Immediate Redirect
            if (/android/i.test(ua)) {
                // If app is installed, this opens the app INSTANTLY.
                // If not, it jumps to Play Store immediately.
                window.location.replace(`intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=${code};end`);
            } 
            else if (/iPad|iPhone|iPod/.test(ua)) {
                // iOS: Try app, then store
                window.location.href = "purnartha://";
                setTimeout(() => {
                    window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                }, 800);
            } 
            else {
                window.location.replace("https://www.purnartha.com");
            }
        })();
    </script>
</body>
</html>
