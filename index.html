<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0056b3; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <textarea id="copyBuffer" style="position: absolute; left: -9999px;"></textarea>

    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode');
            const fullText = "RmRefCode=" + (code || "");

            // 1. Copy to Clipboard logic
            if (code) {
                try {
                    await navigator.clipboard.writeText(fullText);
                } catch (err) {
                    const cb = document.getElementById("copyBuffer");
                    cb.value = fullText;
                    cb.select();
                    document.execCommand('copy');
                }
            }

            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const isAndroid = /Android/i.test(navigator.userAgent);

            if (isAndroid) {
                // Android handles the fallback automatically via the Intent scheme
                const storeUrl = "https://play.google.com/store/apps/details?id=com.purnarthav2.app";
                const intent = `intent://open#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
                window.location.replace(intent);
            } 
            else if (isIOS) {
                const appStoreUrl = "https://apps.apple.com/in/app/purnartha/id6759093164";
                const appScheme = "purnartha://";
                
                let appOpened = false;

                // If the user switches away from the browser (to the app or system popup), 
                // we set appOpened to true to prevent the App Store redirect.
                const handleVisibilityChange = () => {
                    if (document.hidden || document.webkitHidden) {
                        appOpened = true;
                    }
                };

                window.addEventListener("visibilitychange", handleVisibilityChange);
                window.addEventListener("pagehide", handleVisibilityChange);
                window.onblur = () => { appOpened = true; };

                // Attempt to open the app
                window.location.href = appScheme;

                // Fallback mechanism: Wait 2.5 seconds.
                // If the app isn't installed, the visibility won't change, and we redirect.
                setTimeout(() => {
                    if (!appOpened) {
                        window.location.replace(appStoreUrl);
                    }
                }, 2500); 
            }
        };
    </script>
</body>
</html>
