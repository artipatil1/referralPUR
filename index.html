<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Purnartha</title>
    <style>
        body { background-color: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .loader { opacity: 0.6; font-size: 14px; }
    </style>
</head>
<body>
    <div class="loader">Connecting...</div>

    <script>
        async function startGhostRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const dynamicCode = urlParams.get('RmRefCode') || "";
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // --- UNIFIED STEP: COPY TO CLIPBOARD ---
            if (dynamicCode) {
                try {
                    // We save it with a prefix so the App knows it's OUR code
                    await navigator.clipboard.writeText("RmRefCode=" + dynamicCode);
                } catch (e) {
                    console.log("Clipboard blocked or not supported");
                }
            }

            // --- UNIFIED STEP: REDIRECT ---
            if (/android/i.test(userAgent)) {
                // Android Store
                window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app");
            } 
            else if (/iPad|iPhone|iPod/.test(userAgent)) {
                // Apple Store
                window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
            } 
            else {
                // Desktop
                window.location.replace("https://www.purnartha.com");
            }
        }

        window.onload = startGhostRedirect;
    </script>
</body>
</html>
