<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Purnartha</title>
    <style>body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }</style>
</head>
<body>
    <div id="status" style="text-align: center;"><p style="opacity: 0.5;">Connecting...</p></div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua);

            // This only runs if the app is NOT installed
            async function triggerNewUserFlow() {
                if (code) {
                    try {
                        // Copy happens ONLY for people going to the store
                        await navigator.clipboard.writeText("RmRefCode=" + code);
                    } catch (e) {}
                }
                if (isIOS) {
                    window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                } else {
                    window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + code);
                }
            }

            if (isIOS) {
                // iOS logic: Safari needs a gentle push
                window.location.href = "purnartha://";
                
                // If the app is installed, Safari will show a popup.
                // If the user hasn't left the page in 2 seconds, assume app is missing.
                let checkInstall = setTimeout(() => {
                    if (!document.hidden) {
                        triggerNewUserFlow();
                    }
                }, 2000);

                // If user opens app, clear the timer so we don't copy the code
                window.onblur = () => clearTimeout(checkInstall);

            } else if (/android/i.test(ua)) {
                // Android logic: Intent handles the "Existing User" check perfectly
                const storeUrl = `https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=${code}`;
                const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${encodeURIComponent(window.location.href + '&mode=store')};end`;
                
                if (params.get('mode') === 'store') {
                    triggerNewUserFlow();
                } else {
                    window.location.replace(intent);
                }
            }
        };
    </script>
</body>
</html>
