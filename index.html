<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <title>Purnartha | Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3; /* Purnartha Blue */
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
        }
        /* Hidden input for copying logic */
        #copyBuffer { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Connecting to App Store...</div>
    <textarea id="copyBuffer"></textarea>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);

            async function performCopyAndStore() {
                if (code) {
                    const buffer = document.getElementById("copyBuffer");
                    buffer.value = "RmRefCode=" + code;
                    buffer.select();
                    try {
                        // Attempt modern copy first
                        await navigator.clipboard.writeText("RmRefCode=" + code);
                    } catch (e) {
                        // Fallback copy for older browsers
                        document.execCommand('copy');
                    }
                }
                
                // Redirect to respective store apps
                if (isIOS) {
                    window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                } else {
                    // market:// forces the Play Store APP to open, not the browser website
                    window.location.replace("market://details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    
                    // Fallback for Android if market link fails
                    setTimeout(() => {
                        window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    }, 1000);
                }
            }

            if (isIOS) {
                // 1. Try to open the app directly
                window.location.href = "purnartha://";
                
                // 2. If app is missing, wait 2 seconds then go to Store + Copy
                let iosTimer = setTimeout(() => {
                    if (!document.hidden) { performCopyAndStore(); }
                }, 2000);

                window.onblur = () => clearTimeout(iosTimer);

            } else if (ua.indexOf("android") > -1) {
                // If we are already in the "fallback" mode (after intent fails)
                if (params.get('mode') === 'store') {
                    performCopyAndStore();
                } else {
                    // Try to jump into the app. If installed, browser closes immediately.
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            }
        };
    </script>
</body>
</html>
