<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <textarea id="copyBuffer" style="position: absolute; left: -9999px;"></textarea>

    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode');
            const fullText = "RmRefCode=" + code;

            // 1. Copy to Clipboard (The Bridge)
            if (code) {
                try {
                    await navigator.clipboard.writeText(fullText);
                } catch (err) {
                    const cb = document.getElementById("copyBuffer");
                    cb.value = fullText;
                    cb.select();
                    document.execCommand('copy');
                }
            }

            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const isAndroid = /Android/i.test(navigator.userAgent);

            if (isAndroid) {
                // Android Intent: Tries to open app, fallbacks to Play Store if not found
                const storeUrl = "https://play.google.com/store/apps/details?id=com.purnarthav2.app";
                const intent = `intent://open#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
                window.location.replace(intent);
            } else if (isIOS) {
                // iOS: Try custom scheme
                window.location.href = "purnartha://";
                // Fallback to App Store if app doesn't open in 1.5 seconds
                setTimeout(() => {
                    if (!document.hidden) {
                        window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 1500);
            }
        };
    </script>
</body>
</html>
