<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Purnartha</title>
    <style>body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }</style>
</head>
<body>
    <div style="text-align: center;"><p style="opacity: 0.5; font-family: sans-serif;">Connecting...</p></div>

    <script>
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('RmRefCode') || "";
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua);
            const isAndroid = /android/i.test(ua);

            // FUNCTION: The "New User" Flow (Copy + Store)
            const goToStore = async () => {
                if (code) {
                    try { await navigator.clipboard.writeText("RmRefCode=" + code); } catch (e) {}
                }
                if (isIOS) {
                    window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                } else if (isAndroid) {
                    window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + code);
                }
            };

            // MAIN LOGIC
            if (isIOS) {
                // Try to open app. If user has it, they leave the browser.
                window.location.href = "purnartha://";
                
                // If they are still here after 1.5 seconds, they don't have the app.
                setTimeout(() => {
                    if (!document.hidden) { goToStore(); }
                }, 1500);

            } else if (isAndroid) {
                // Use Intent. If app exists, it opens (No Copy). 
                // If app MISSING, it triggers browser_fallback_url (Which calls goToStore logic).
                const storeUrl = `https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=${code}`;
                const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
                
                // We add a tiny delay to ensure the clipboard isn't touched unless fallback happens
                window.location.replace(intent);
            }
        };
    </script>
</body>
</html>
