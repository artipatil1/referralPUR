<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Purnartha</title>
    <style>
        /* Force total blackness on the whole page */
        :root { color-scheme: dark; }
        html, body { 
            background-color: #000000 !important; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }
        .text { color: #333; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>
    <div class="text">Redirecting...</div>
    <input type="text" id="copyBox" style="position:absolute;left:-9999px;">

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent.toLowerCase();

            function doCopy() {
                if (!code) return;
                const box = document.getElementById("copyBox");
                box.value = "RmRefCode=" + code;
                box.select();
                try { document.execCommand('copy'); } catch (e) {}
            }

            if (ua.indexOf("android") > -1) {
                // If the app is NOT installed, we come back here with mode=store
                if (params.get('mode') === 'store') {
                    doCopy(); // Copy only for new users
                    // Direct link to the Play Store APP (market://)
                    window.location.replace("market://details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    
                    // Fallback in case market:// fails
                    setTimeout(() => {
                        window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + encodeURIComponent(code));
                    }, 1000);
                } else {
                    // Try to open the app directly. 
                    // If it opens, this browser tab is destroyed immediately (no copy happens).
                    const fallback = encodeURIComponent(window.location.href + "&mode=store");
                    const intent = `intent://scan/#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${fallback};end`;
                    window.location.replace(intent);
                }
            } 
            else if (/iphone|ipad|ipod/.test(ua)) {
                window.location.href = "purnartha://";
                setTimeout(() => {
                    if (!document.hidden) {
                        doCopy();
                        window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 2000);
            }
        };
    </script>
</body>
</html>
