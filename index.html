<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purnartha</title>
    <style>body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }</style>
</head>
<body>
    <div style="text-align: center;"><p style="opacity: 0.5;">Opening App Store...</p></div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode') || "";
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua);

            if (isIOS) {
                // 1. Try to open the app
                window.location.href = "purnartha://";
                
                // 2. Force App Store redirect regardless after a short delay
                // This ensures the user doesn't stay stuck on the black HTML page
                setTimeout(async () => {
                    // Check if the user is still on this browser tab
                    if (!document.hidden) {
                        if (code) {
                            try {
                                // Copy the code for the new user
                                await navigator.clipboard.writeText("RmRefCode=" + code);
                            } catch (e) {}
                        }
                        // Redirect to App Store
                        window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
                    }
                }, 1000);

            } else if (/android/i.test(ua)) {
                // Android logic (remains the same as it is working well)
                const packageName = "com.purnarthav2.app";
                const playStoreUrl = `https://play.google.com/store/apps/details?id=${packageName}&referrer=${code}`;
                const intent = `intent://scan/#Intent;scheme=purnartha;package=${packageName};S.browser_fallback_url=${encodeURIComponent(playStoreUrl)};end`;
                window.location.replace(intent);
            } else {
                window.location.replace("https://www.purnartha.com");
            }
        };
    </script>
</body>
</html>
