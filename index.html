<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purnartha</title>
    <style>
        /* Black background matches the system transition for a seamless feel */
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <p style="font-size: 14px; opacity: 0.5;">Connecting...</p>
    </div>

    <script>
        async function startGhostRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const dynamicCode = urlParams.get('RmRefCode') || "";
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // 1. STEP: COPY CODE (Takes 0.1s)
            if (dynamicCode) {
                try {
                    // Flutter looks for "RmRefCode=" prefix
                    await navigator.clipboard.writeText("RmRefCode=" + dynamicCode);
                } catch (e) {
                    console.log("Clipboard skip");
                }
            }

            // 2. STEP: REDIRECT & CLOSE BROWSER
            if (/android/i.test(userAgent)) {
                // For Android: Redirects to Play Store App + Shows Install Overlay
                // Using .replace() ensures the browser "disappears" from history
                window.location.replace("https://play.google.com/store/apps/details?id=com.purnarthav2.app&referrer=" + dynamicCode);
            } 
            else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                // For iOS: Redirects to Apple App Store App
                window.location.replace("https://apps.apple.com/in/app/purnartha/id6759093164");
            } 
            else {
                // Desktop Fallback
                window.location.replace("https://www.purnartha.com");
            }
        }

        window.onload = startGhostRedirect;
    </script>
</body>
</html>
