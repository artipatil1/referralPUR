<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0056b3; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('RmRefCode');
            const appStoreUrl = "https://apps.apple.com/in/app/purnartha/id6759093164";
            const playStoreUrl = "https://play.google.com/store/apps/details?id=com.purnarthav2.app";

            // 1. Copy to Clipboard
            if (code) {
                const el = document.createElement('textarea');
                el.value = "RmRefCode=" + code;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            }

            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isAndroid) {
                // Android Intent closes the browser interaction properly
                const intent = `intent://open#Intent;scheme=purnartha;package=com.purnarthav2.app;S.browser_fallback_url=${encodeURIComponent(playStoreUrl)};end`;
                window.location.replace(intent);
            } 
            else if (isIOS) {
                // THE iOS FIX:
                // We attempt to open the app.
                window.location.href = "purnartha://";

                // We immediately start a timer. 
                // If the app is NOT installed, Safari shows a popup.
                // We use .replace so that the browser window ITSELF becomes the App Store.
                setTimeout(() => {
                    if (!document.hidden && !document.webkitHidden) {
                        // This replaces the loader page with the App Store immediately.
                        // When the user closes the "Invalid Address" popup, 
                        // they are ALREADY inside the App Store.
                        window.location.replace(appStoreUrl);
                    }
                }, 800); 
            }
        };
    </script>
</body>
</html>
